name: release

# Tag a commit (e.g. `git tag v0.1.0 && git push --tags`) to build a Release and
# publish a zipped build as a GitHub Release.
on:
  push:
    tags: [ 'v*' ]

jobs:
  windows-release:
    runs-on: windows-2022
    permissions:
      contents: write   # needed to create the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-${{ runner.os }}-${{ hashFiles('Scripts/Generate-Solution.py') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Configure (vcpkg + CMake)
        run: py Scripts/Generate-Solution.py

      - name: Build Release
        run: cmake --build build --config Release

      # NOTE: first-run verification needed. This bundles the built exes + their
      # adjacent DLLs (vcpkg deploys dependency DLLs next to the exe), plus Assets
      # and Tools (dxc is needed for runtime shader compilation). Adjust the glob
      # if the build output layout differs.
      - name: Package
        shell: pwsh
        run: |
          $staging = "Snowstorm-${{ github.ref_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Get-ChildItem -Path build -Recurse -Directory |
            Where-Object { $_.Name -eq 'Release' } |
            ForEach-Object { Copy-Item "$($_.FullName)\*" -Destination $staging -Recurse -Force -ErrorAction SilentlyContinue }
          Copy-Item -Recurse -Force Assets (Join-Path $staging 'Assets')
          Copy-Item -Recurse -Force Tools  (Join-Path $staging 'Tools')
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip" -Force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} "Snowstorm-${{ github.ref_name }}.zip" --generate-notes
